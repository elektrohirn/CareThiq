{% extends "base.html" %}

{% block content %}
<div class="auth-card">
    <h1>Konto erstellen<br><span>CareThiq</span></h1>
    <p class="subtitle">Kostenlos registrieren.</p>

    <form method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required autofocus>
        </div>
        <div class="form-group">
            <label>E-Mail</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Passwort</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Registrieren</button>
    </form>

    <p class="auth-link">
        Bereits ein Konto? <a href="{{ url_for('main.login') }}">Anmelden</a>
    </p>
</div>
{% endblock %}
