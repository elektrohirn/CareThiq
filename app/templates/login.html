{% extends "base.html" %}

{% block content %}
<div class="auth-card">
    <h1>Willkommen bei<br><span>CareThiq</span></h1>
    <p class="subtitle">Bitte melde dich an.</p>

    <form method="POST">
        <div class="form-group">
            <label>E-Mail</label>
            <input type="email" name="email" required autofocus>
        </div>
        <div class="form-group">
            <label>Passwort</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Anmelden</button>
    </form>

    <p class="auth-link">
        Noch kein Konto? <a href="{{ url_for('main.register') }}">Registrieren</a>
    </p>
</div>
{% endblock %}
